name: Playwright Tests
on:
  push:
    branches: [ main, master ]

  pull_request:
    branches: [ main, master ]

  workflow_dispatch:
    inputs:
      app_url:
        description: 'Application URL to test against'
        required: false
        type: string
      trigger_repo:
        description: 'Repository that triggered the run'
        required: false
        type: string
      trigger_ref:
        description: 'Branch/PR ref that triggered the run'
        required: false
        type: string

jobs:
  run-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Install dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run shard ${{ matrix.shard }}/4
      run: |
        if [ -n "$INPUT_APP_URL" ]; then
          export APP_URL="$INPUT_APP_URL"
        fi
        npx playwright test --reporter=blob --shard=${{ matrix.shard }}/4
      env:
        INPUT_APP_URL: ${{ inputs.app_url }}
        
    - name: Upload shard report artifact
      if: ${{ !cancelled() }}
      uses: actions/upload-artifact@v4
      with:
        name: shard-${{ matrix.shard }}
        path: blob-report/

  merge-and-publish:
    needs: run-tests
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-blobs

      - name: Merge reports
        run: |
          mkdir -p all-blobs-merged
          mv all-blobs/shard-*/* all-blobs-merged/
          npx playwright merge-reports --reporter html all-blobs-merged

      - name: Upload merged HTML report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4