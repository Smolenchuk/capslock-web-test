name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      app_url:
        description: 'Application URL to test against'
        required: false
        type: string
      trigger_repo:
        description: 'Repository that triggered the run'
        required: false
        type: string
      trigger_ref:
        description: 'Branch/PR ref that triggered the run'
        required: false
        type: string
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: |
        if [ -n "$INPUT_APP_URL" ]; then
          export APP_URL="$INPUT_APP_URL"
        fi
        npx playwright test
      env:
        INPUT_APP_URL: ${{ inputs.app_url }}
    - name: Upload Playwright HTML report
      uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Download the report artifact from previous job
      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      # Prepare GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Upload report to GitHub Pages
      - name: Upload report to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: playwright-report

      # Deploy
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4